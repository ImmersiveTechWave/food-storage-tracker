<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Food Storage Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
      color: #1A1C1A;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }
    .fst-noscroll::-webkit-scrollbar { display: none; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    @keyframes fst-fade { from { transform: translateY(0); } to { transform: translateY(0); } }
    @keyframes fst-slide-up { from { transform: translateY(18px); } to { transform: translateY(0); } }
    @keyframes fst-slide-down { from { transform: translateY(-18px); } to { transform: translateY(0); } }
    @keyframes fst-pop { 0% { transform: scale(0.97); } 60% { transform: scale(1.01); } 100% { transform: scale(1); } }

    .fst-card { transition: transform .12s ease, box-shadow .12s ease; }
    .fst-card:active { transform: scale(0.985); }
  </style>
  <template id="__bundler_thumbnail">
    <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#1C73D2,#0E8C99);">
      <div style="font-size:46%;">🧊❄️🛢️🫙</div>
    </div>
  </template>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="theme.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="overlays.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
